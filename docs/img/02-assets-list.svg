<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1440" height="1126" viewBox="0 0 1440 1126">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="24" y="28" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Assets — search, filter, favorites, ratings</text>
  <text x="24" y="46" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">Catalog of every registered asset. Multi-term search defaults to OR; &quot;all of&quot; forces AND.</text>
  <image href="02-assets-list.png" x="0" y="56" width="1440" height="900" preserveAspectRatio="xMidYMin meet" />
  <g transform="translate(0, 56)">
  <rect x="108" y="296" width="1224" height="117" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="168" y="430" width="836" height="35" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1017" y="430" width="121" height="35" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1149" y="437" width="124" height="22" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="108" y="510" width="800" height="80" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  
  <circle cx="720" cy="355" r="20" fill="white" />
  <circle cx="720" cy="355" r="18" fill="#ef4444" />
  <text x="720" y="361" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">1</text>
  <circle cx="586" cy="447" r="20" fill="white" />
  <circle cx="586" cy="447" r="18" fill="#ef4444" />
  <text x="586" y="453" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">2</text>
  <circle cx="1077" cy="447" r="20" fill="white" />
  <circle cx="1077" cy="447" r="18" fill="#ef4444" />
  <text x="1077" y="453" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">3</text>
  <circle cx="1210" cy="447" r="20" fill="white" />
  <circle cx="1210" cy="447" r="18" fill="#ef4444" />
  <text x="1210" y="453" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">4</text>
  <circle cx="200" cy="533" r="20" fill="white" />
  <circle cx="200" cy="533" r="18" fill="#ef4444" />
  <text x="200" y="539" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">5</text>
  </g>
  <rect x="0" y="956" width="1440" height="170" fill="#f9fafb" stroke="#e5e7eb" />
  
  <circle cx="38" cy="988" r="13" fill="#ef4444" />
  <text x="38" y="993.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="62" y="994" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Top favorites strip — pinned 5-star favorites surface first so they&apos;re always one click away.</text>
  <circle cx="38" cy="1014" r="13" fill="#ef4444" />
  <text x="38" y="1019.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="62" y="1020" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Multi-term search box — &quot;all of …&quot; forces AND across name/description/tags/owner/language/repo.</text>
  <circle cx="38" cy="1040" r="13" fill="#ef4444" />
  <text x="38" y="1045.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="62" y="1046" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Type filter — narrow to libraries, services, infra, etc.</text>
  <circle cx="38" cy="1066" r="13" fill="#ef4444" />
  <text x="38" y="1071.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">4</text>
  <text x="62" y="1072" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Favorites-only toggle.</text>
  <circle cx="38" cy="1092" r="13" fill="#ef4444" />
  <text x="38" y="1097.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">5</text>
  <text x="62" y="1098" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Per-asset row: ♥ favorite + ★★★★★ rating + tags + lifecycle chip + repo description.</text>
</svg>
