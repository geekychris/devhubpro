<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1440" height="1152" viewBox="0 0 1440 1152">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="24" y="28" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Port registry — every port the portal knows about</text>
  <text x="24" y="46" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">Three sources unified: local docker host ports, Kubernetes NodePorts, and active kubectl port-forward tunnels.</text>
  <image href="10-ports.png" x="0" y="56" width="1440" height="900" preserveAspectRatio="xMidYMin meet" />
  <g transform="translate(0, 56)">
  <rect x="108" y="248" width="1224" height="36" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="180" y="330" width="793" height="36" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1024" y="335" width="90" height="26" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="180" y="396" width="200" height="26" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="180" y="730" width="600" height="30" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1245" y="442" width="50" height="320" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  
  <circle cx="720" cy="265" r="20" fill="white" />
  <circle cx="720" cy="265" r="18" fill="#ef4444" />
  <text x="720" y="271" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">1</text>
  <circle cx="576" cy="347" r="20" fill="white" />
  <circle cx="576" cy="347" r="18" fill="#ef4444" />
  <text x="576" y="353" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">2</text>
  <circle cx="1067" cy="347" r="20" fill="white" />
  <circle cx="1067" cy="347" r="18" fill="#ef4444" />
  <text x="1067" y="353" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">3</text>
  <circle cx="264" cy="412" r="20" fill="white" />
  <circle cx="264" cy="412" r="18" fill="#ef4444" />
  <text x="264" y="418" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">4</text>
  <circle cx="264" cy="750" r="20" fill="white" />
  <circle cx="264" cy="750" r="18" fill="#ef4444" />
  <text x="264" y="756" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">5</text>
  <circle cx="1300" cy="525" r="20" fill="white" />
  <circle cx="1300" cy="525" r="18" fill="#ef4444" />
  <text x="1300" y="531" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">6</text>
  </g>
  <rect x="0" y="956" width="1440" height="196" fill="#f9fafb" stroke="#e5e7eb" />
  
  <circle cx="38" cy="988" r="13" fill="#ef4444" />
  <text x="38" y="993.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="62" y="994" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Single registry across the whole portal — no two assets get the same port.</text>
  <circle cx="38" cy="1014" r="13" fill="#ef4444" />
  <text x="38" y="1019.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="62" y="1020" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Filter — by asset id, port, URL, or pod name.</text>
  <circle cx="38" cy="1040" r="13" fill="#ef4444" />
  <text x="38" y="1045.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="62" y="1046" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Group toggle — by scope (local/nodeport/forward) or by asset.</text>
  <circle cx="38" cy="1066" r="13" fill="#ef4444" />
  <text x="38" y="1071.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">4</text>
  <text x="62" y="1072" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Local docker section — host ports backing local containers.</text>
  <circle cx="38" cy="1092" r="13" fill="#ef4444" />
  <text x="38" y="1097.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">5</text>
  <text x="62" y="1098" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Kubernetes NodePort section — Rancher Desktop forwards these straight to localhost.</text>
  <circle cx="38" cy="1118" r="13" fill="#ef4444" />
  <text x="38" y="1123.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">6</text>
  <text x="62" y="1124" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Click-to-copy URLs make it trivial to paste a NodePort URL into Postman / curl / browser.</text>
</svg>
