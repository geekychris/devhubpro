<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1440" height="1369" viewBox="0 0 1440 1369">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="24" y="28" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Asset detail — overview tab</text>
  
  <image href="04-asset-overview.png" x="0" y="56" width="1440" height="1117" preserveAspectRatio="xMidYMin meet" />
  <g transform="translate(0, 56)">
  <rect x="108" y="343" width="1064" height="30" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="180" y="396" width="140" height="32" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="355" y="396" width="207" height="32" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="510" y="396" width="320" height="32" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1041" y="270" width="100" height="36" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="180" y="760" width="1054" height="80" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  
  <circle cx="720" cy="356" r="20" fill="white" />
  <circle cx="720" cy="356" r="18" fill="#ef4444" />
  <text x="720" y="362" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">1</text>
  <circle cx="247" cy="408" r="20" fill="white" />
  <circle cx="247" cy="408" r="18" fill="#ef4444" />
  <text x="247" y="414" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">2</text>
  <circle cx="460" cy="408" r="20" fill="white" />
  <circle cx="460" cy="408" r="18" fill="#ef4444" />
  <text x="460" y="414" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">3</text>
  <circle cx="670" cy="408" r="20" fill="white" />
  <circle cx="670" cy="408" r="18" fill="#ef4444" />
  <text x="670" y="414" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">4</text>
  <circle cx="1088" cy="287" r="20" fill="white" />
  <circle cx="1088" cy="287" r="18" fill="#ef4444" />
  <text x="1088" y="293" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">5</text>
  <circle cx="377" cy="811" r="20" fill="white" />
  <circle cx="377" cy="811" r="18" fill="#ef4444" />
  <text x="377" y="817" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">6</text>
  </g>
  <rect x="0" y="1173" width="1440" height="196" fill="#f9fafb" stroke="#e5e7eb" />
  
  <circle cx="38" cy="1205" r="13" fill="#ef4444" />
  <text x="38" y="1210.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="62" y="1211" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Tab strip — overview, dependencies, graph, builds, runtime, cluster, analyze, changes, fixtures, docs, panels.</text>
  <circle cx="38" cy="1231" r="13" fill="#ef4444" />
  <text x="38" y="1236.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="62" y="1237" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Favorite toggle — boosts the asset to the Top Favorites strip on the assets page.</text>
  <circle cx="38" cy="1257" r="13" fill="#ef4444" />
  <text x="38" y="1262.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="62" y="1263" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">5-star rating — sortable + filterable across the whole catalog.</text>
  <circle cx="38" cy="1283" r="13" fill="#ef4444" />
  <text x="38" y="1288.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">4</text>
  <text x="62" y="1289" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Pin to dashboard — adds this asset to the running-services dashboard so you can start/stop it from there.</text>
  <circle cx="38" cy="1309" r="13" fill="#ef4444" />
  <text x="38" y="1314.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">5</text>
  <text x="62" y="1315" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Ask Claude — opens an annotated context dump tailored to this asset (manifest, deps, recent commits…).</text>
  <circle cx="38" cy="1335" r="13" fill="#ef4444" />
  <text x="38" y="1340.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">6</text>
  <text x="62" y="1341" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Tag editor with autocomplete — shared tag namespace across the catalog.</text>
</svg>
