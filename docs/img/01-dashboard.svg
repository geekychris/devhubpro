<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1440" height="1301" viewBox="0 0 1440 1301">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="24" y="28" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Dashboard — pinned services with one-click start/stop</text>
  <text x="24" y="46" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">Pin any asset to the dashboard; Start/Stop drives kubectl apply/delete on the runtime closure.</text>
  <image href="01-dashboard.png" x="0" y="56" width="1440" height="997" preserveAspectRatio="xMidYMin meet" />
  <g transform="translate(0, 56)">
  <rect x="1106" y="308" width="60" height="30" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1166" y="308" width="60" height="30" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1224" y="308" width="32" height="30" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="977" y="312" width="38" height="22" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="745" y="458" width="130" height="32" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="892" y="519" width="152" height="28" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="745" y="577" width="188" height="30" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1208" y="252" width="70" height="26" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  
  <circle cx="1136" cy="323" r="20" fill="white" />
  <circle cx="1136" cy="323" r="18" fill="#ef4444" />
  <text x="1136" y="329" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">1</text>
  <circle cx="1195" cy="323" r="20" fill="white" />
  <circle cx="1195" cy="323" r="18" fill="#ef4444" />
  <text x="1195" y="329" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">2</text>
  <circle cx="1240" cy="323" r="20" fill="white" />
  <circle cx="1240" cy="323" r="18" fill="#ef4444" />
  <text x="1240" y="329" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">3</text>
  <circle cx="995" cy="322" r="20" fill="white" />
  <circle cx="995" cy="322" r="18" fill="#ef4444" />
  <text x="995" y="328" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">4</text>
  <circle cx="809" cy="473" r="20" fill="white" />
  <circle cx="809" cy="473" r="18" fill="#ef4444" />
  <text x="809" y="479" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">5</text>
  <circle cx="967" cy="532" r="20" fill="white" />
  <circle cx="967" cy="532" r="18" fill="#ef4444" />
  <text x="967" y="538" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">6</text>
  <circle cx="807" cy="591" r="20" fill="white" />
  <circle cx="807" cy="591" r="18" fill="#ef4444" />
  <text x="807" y="597" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">7</text>
  <circle cx="1241" cy="265" r="20" fill="white" />
  <circle cx="1241" cy="265" r="18" fill="#ef4444" />
  <text x="1241" y="271" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">8</text>
  </g>
  <rect x="0" y="1053" width="1440" height="248" fill="#f9fafb" stroke="#e5e7eb" />
  
  <circle cx="38" cy="1085" r="13" fill="#ef4444" />
  <text x="38" y="1090.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="62" y="1091" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Start — kubectl apply for the asset and every runtime dependency, then runs lifecycle hooks.</text>
  <circle cx="38" cy="1111" r="13" fill="#ef4444" />
  <text x="38" y="1116.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="62" y="1117" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Stop — kubectl delete for the same closure.</text>
  <circle cx="38" cy="1137" r="13" fill="#ef4444" />
  <text x="38" y="1142.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="62" y="1143" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Pin/unpin: pinned assets persist on the dashboard even when stopped.</text>
  <circle cx="38" cy="1163" r="13" fill="#ef4444" />
  <text x="38" y="1168.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">4</text>
  <text x="62" y="1169" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Live status chip — turns green when any endpoint of the asset is reachable.</text>
  <circle cx="38" cy="1189" r="13" fill="#ef4444" />
  <text x="38" y="1194.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">5</text>
  <text x="62" y="1195" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Web UI quick-link — promoted from manifest endpoints with role: &quot;Web UI&quot;.</text>
  <circle cx="38" cy="1215" r="13" fill="#ef4444" />
  <text x="38" y="1220.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">6</text>
  <text x="62" y="1221" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Auto-detected Swagger / OpenAPI URL — probes /v3/api-docs and friends and caches per-host.</text>
  <circle cx="38" cy="1241" r="13" fill="#ef4444" />
  <text x="38" y="1246.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">7</text>
  <text x="62" y="1247" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Credential fixtures — quick-link to a fixture that surfaces seeded test accounts.</text>
  <circle cx="38" cy="1267" r="13" fill="#ef4444" />
  <text x="38" y="1272.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">8</text>
  <text x="62" y="1273" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Hide off — collapses stopped cards out of view; turn back on with one click.</text>
</svg>
