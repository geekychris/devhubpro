<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1440" height="2426" viewBox="0 0 1440 2426">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="24" y="28" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Docs tab — markdown with rendered Mermaid</text>
  <text x="24" y="46" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">Every .md in the asset workspace is browseable; mermaid blocks render to SVG inline (lazy-loaded so the bundle stays small).</text>
  <image href="08-asset-docs.png" x="0" y="56" width="1440" height="2200" preserveAspectRatio="xMidYMin meet" />
  <g transform="translate(0, 56)">
  <rect x="108" y="200" width="250" height="1900" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="108" y="365" width="256" height="28" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1180" y="192" width="70" height="22" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="400" y="1330" width="700" height="480" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="400" y="1900" width="700" height="280" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  
  <circle cx="230" cy="600" r="20" fill="white" />
  <circle cx="230" cy="600" r="18" fill="#ef4444" />
  <text x="230" y="606" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">1</text>
  <circle cx="230" cy="380" r="20" fill="white" />
  <circle cx="230" cy="380" r="18" fill="#ef4444" />
  <text x="230" y="386" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">2</text>
  <circle cx="1245" cy="200" r="20" fill="white" />
  <circle cx="1245" cy="200" r="18" fill="#ef4444" />
  <text x="1245" y="206" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">3</text>
  <circle cx="800" cy="1450" r="20" fill="white" />
  <circle cx="800" cy="1450" r="18" fill="#ef4444" />
  <text x="800" y="1456" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">4</text>
  <circle cx="800" cy="2050" r="20" fill="white" />
  <circle cx="800" cy="2050" r="18" fill="#ef4444" />
  <text x="800" y="2056" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">5</text>
  </g>
  <rect x="0" y="2256" width="1440" height="170" fill="#f9fafb" stroke="#e5e7eb" />
  
  <circle cx="38" cy="2288" r="13" fill="#ef4444" />
  <text x="38" y="2293.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="62" y="2294" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">File tree — every .md found in the asset&apos;s local workspace, sorted by path.</text>
  <circle cx="38" cy="2314" r="13" fill="#ef4444" />
  <text x="38" y="2319.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="62" y="2320" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Active doc highlighted — click any file to load it.</text>
  <circle cx="38" cy="2340" r="13" fill="#ef4444" />
  <text x="38" y="2345.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="62" y="2346" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Raw — link to the original markdown for copy/pasting back to GitHub.</text>
  <circle cx="38" cy="2366" r="13" fill="#ef4444" />
  <text x="38" y="2371.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">4</text>
  <text x="62" y="2372" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Mermaid diagram rendered to SVG inline — mermaid is dynamic-imported on demand so the docs page only pays for it when needed.</text>
  <circle cx="38" cy="2392" r="13" fill="#ef4444" />
  <text x="38" y="2397.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">5</text>
  <text x="62" y="2398" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Multiple diagrams per doc render concurrently; the renderer falls back to a styled error block on bad syntax.</text>
</svg>
