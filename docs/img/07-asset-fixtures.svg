<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1440" height="1126" viewBox="0 0 1440 1126">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="24" y="28" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Test fixtures — surfaced credentials and seed data</text>
  <text x="24" y="46" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">Fixtures emit a structured DEVPORTAL_FIXTURE: line so the portal can extract usernames, passwords, login URLs and render them in the UI.</text>
  <image href="07-asset-fixtures.png" x="0" y="56" width="1440" height="900" preserveAspectRatio="xMidYMin meet" />
  <g transform="translate(0, 56)">
  <rect x="180" y="404" width="130" height="28" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1170" y="340" width="102" height="32" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="195" y="495" width="130" height="22" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="180" y="570" width="1080" height="150" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="180" y="720" width="510" height="30" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  
  <circle cx="236" cy="416" r="20" fill="white" />
  <circle cx="236" cy="416" r="18" fill="#ef4444" />
  <text x="236" y="422" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">1</text>
  <circle cx="1230" cy="356" r="20" fill="white" />
  <circle cx="1230" cy="356" r="18" fill="#ef4444" />
  <text x="1230" y="362" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">2</text>
  <circle cx="253" cy="505" r="20" fill="white" />
  <circle cx="253" cy="505" r="18" fill="#ef4444" />
  <text x="253" y="511" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">3</text>
  <circle cx="720" cy="644" r="20" fill="white" />
  <circle cx="720" cy="644" r="18" fill="#ef4444" />
  <text x="720" y="650" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">4</text>
  <circle cx="349" cy="740" r="20" fill="white" />
  <circle cx="349" cy="740" r="18" fill="#ef4444" />
  <text x="349" y="746" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">5</text>
  </g>
  <rect x="0" y="956" width="1440" height="170" fill="#f9fafb" stroke="#e5e7eb" />
  
  <circle cx="38" cy="988" r="13" fill="#ef4444" />
  <text x="38" y="993.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="62" y="994" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Fixture name + description from devportal.yaml.</text>
  <circle cx="38" cy="1014" r="13" fill="#ef4444" />
  <text x="38" y="1019.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="62" y="1020" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Run / Run again — invokes the script in the asset workspace and streams its log.</text>
  <circle cx="38" cy="1040" r="13" fill="#ef4444" />
  <text x="38" y="1045.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="62" y="1046" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Run status — exit code, duration, timestamp, full log behind &quot;Show log&quot;.</text>
  <circle cx="38" cy="1066" r="13" fill="#ef4444" />
  <text x="38" y="1071.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">4</text>
  <text x="62" y="1072" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Parsed credentials table — DEVPORTAL_FIXTURE: contract emits username/password/role/url tuples.</text>
  <circle cx="38" cy="1092" r="13" fill="#ef4444" />
  <text x="38" y="1097.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">5</text>
  <text x="62" y="1098" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Quick-launch links — open the right URL signed in as the right user in one click.</text>
</svg>
