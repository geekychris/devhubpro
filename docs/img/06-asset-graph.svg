<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1440" height="1178" viewBox="0 0 1440 1178">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="24" y="28" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Dependency graph — producers and consumers</text>
  <text x="24" y="46" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">Interactive React Flow graph; auto-laid-out via dagre, with edge labels for the dependency kind.</text>
  <image href="06-asset-graph.png" x="0" y="56" width="1440" height="900" preserveAspectRatio="xMidYMin meet" />
  <g transform="translate(0, 56)">
  <rect x="180" y="420" width="296" height="35" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="486" y="420" width="137" height="35" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="630" y="420" width="137" height="35" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="212" y="488" width="145" height="22" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1170" y="488" width="100" height="22" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1230" y="595" width="28" height="28" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="108" y="685" width="1224" height="200" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  
  <circle cx="328" cy="437" r="20" fill="white" />
  <circle cx="328" cy="437" r="18" fill="#ef4444" />
  <text x="328" y="443" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">1</text>
  <circle cx="553" cy="437" r="20" fill="white" />
  <circle cx="553" cy="437" r="18" fill="#ef4444" />
  <text x="553" y="443" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">2</text>
  <circle cx="745" cy="437" r="20" fill="white" />
  <circle cx="745" cy="437" r="18" fill="#ef4444" />
  <text x="745" y="443" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">3</text>
  <circle cx="285" cy="498" r="20" fill="white" />
  <circle cx="285" cy="498" r="18" fill="#ef4444" />
  <text x="285" y="504" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">4</text>
  <circle cx="1218" cy="498" r="20" fill="white" />
  <circle cx="1218" cy="498" r="18" fill="#ef4444" />
  <text x="1218" y="504" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">5</text>
  <circle cx="1243" cy="607" r="20" fill="white" />
  <circle cx="1243" cy="607" r="18" fill="#ef4444" />
  <text x="1243" y="613" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">6</text>
  <circle cx="720" cy="800" r="20" fill="white" />
  <circle cx="720" cy="800" r="18" fill="#ef4444" />
  <text x="720" y="806" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">7</text>
  </g>
  <rect x="0" y="956" width="1440" height="222" fill="#f9fafb" stroke="#e5e7eb" />
  
  <circle cx="38" cy="988" r="13" fill="#ef4444" />
  <text x="38" y="993.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="62" y="994" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Direction filter — producers, consumers, or both.</text>
  <circle cx="38" cy="1014" r="13" fill="#ef4444" />
  <text x="38" y="1019.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="62" y="1020" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Producer depth — limit transitive walk (0 = root only, -1 = unlimited).</text>
  <circle cx="38" cy="1040" r="13" fill="#ef4444" />
  <text x="38" y="1045.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="62" y="1046" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Consumer depth — separate cap so you can include direct callers without exploding the graph.</text>
  <circle cx="38" cy="1066" r="13" fill="#ef4444" />
  <text x="38" y="1071.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">4</text>
  <text x="62" y="1072" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Layout direction — producers right (LR) or producers down (TB).</text>
  <circle cx="38" cy="1092" r="13" fill="#ef4444" />
  <text x="38" y="1097.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">5</text>
  <text x="62" y="1098" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Fullscreen — pop the canvas out for very large graphs.</text>
  <circle cx="38" cy="1118" r="13" fill="#ef4444" />
  <text x="38" y="1123.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">6</text>
  <text x="62" y="1124" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">ReactFlow controls — zoom in/out, fit-to-view, lock pan.</text>
  <circle cx="38" cy="1144" r="13" fill="#ef4444" />
  <text x="38" y="1149.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">7</text>
  <text x="62" y="1150" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Nodes coloured by dependency kind; edge labels (&quot;build&quot;, &quot;runtime&quot;, &quot;data&quot;…) come straight from the manifest.</text>
</svg>
