<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1440" height="1152" viewBox="0 0 1440 1152">
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="24" y="28" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Runtime tab — ports, docker images, kubectl</text>
  <text x="24" y="46" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">All runtime surfaces in one view: the port registry, local docker images, and kubectl apply targets.</text>
  <image href="09-asset-runtime.png" x="0" y="56" width="1440" height="900" preserveAspectRatio="xMidYMin meet" />
  <g transform="translate(0, 56)">
  <rect x="180" y="405" width="280" height="28" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="910" y="402" width="100" height="32" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1010" y="402" width="152" height="32" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1162" y="402" width="110" height="32" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="180" y="670" width="80" height="24" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  <rect x="1055" y="668" width="102" height="32" fill="none" stroke="#ef4444" stroke-width="3" rx="4" ry="4" />
  
  <circle cx="242" cy="417" r="20" fill="white" />
  <circle cx="242" cy="417" r="18" fill="#ef4444" />
  <text x="242" y="423" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">1</text>
  <circle cx="958" cy="417" r="20" fill="white" />
  <circle cx="958" cy="417" r="18" fill="#ef4444" />
  <text x="958" y="423" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">2</text>
  <circle cx="1084" cy="417" r="20" fill="white" />
  <circle cx="1084" cy="417" r="18" fill="#ef4444" />
  <text x="1084" y="423" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">3</text>
  <circle cx="1217" cy="417" r="20" fill="white" />
  <circle cx="1217" cy="417" r="18" fill="#ef4444" />
  <text x="1217" y="423" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">4</text>
  <circle cx="208" cy="681" r="20" fill="white" />
  <circle cx="208" cy="681" r="18" fill="#ef4444" />
  <text x="208" y="687" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">5</text>
  <circle cx="1105" cy="681" r="20" fill="white" />
  <circle cx="1105" cy="681" r="18" fill="#ef4444" />
  <text x="1105" y="687" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">6</text>
  </g>
  <rect x="0" y="956" width="1440" height="196" fill="#f9fafb" stroke="#e5e7eb" />
  
  <circle cx="38" cy="988" r="13" fill="#ef4444" />
  <text x="38" y="993.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="62" y="994" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Port reservations — registry-managed slots so two assets never collide.</text>
  <circle cx="38" cy="1014" r="13" fill="#ef4444" />
  <text x="38" y="1019.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="62" y="1020" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Allocate local — reserves a host port from the 18000-18999 range.</text>
  <circle cx="38" cy="1040" r="13" fill="#ef4444" />
  <text x="38" y="1045.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="62" y="1046" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Allocate NodePort — reserves a slot from 30000-32767 for kubectl exposure.</text>
  <circle cx="38" cy="1066" r="13" fill="#ef4444" />
  <text x="38" y="1071.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">4</text>
  <text x="62" y="1072" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Release — frees the slot back to the registry.</text>
  <circle cx="38" cy="1092" r="13" fill="#ef4444" />
  <text x="38" y="1097.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">5</text>
  <text x="62" y="1098" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">Docker images section — shows running containers and their status.</text>
  <circle cx="38" cy="1118" r="13" fill="#ef4444" />
  <text x="38" y="1123.5" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">6</text>
  <text x="62" y="1124" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#1f2937">+ dependents — apply the runtime closure (this asset and every transitive runtime producer).</text>
</svg>
